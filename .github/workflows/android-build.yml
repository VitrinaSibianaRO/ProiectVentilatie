name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install MAUI Workload
      run: dotnet workload install maui

    - name: Build APK
      working-directory: MobileApp
      run: >
        dotnet publish -f net10.0-android -c Release
        -p:AndroidPackageFormat=apk
        -p:AndroidKeyStore=true
        -p:AndroidSigningKeyStore=ventilatie.keystore
        -p:AndroidSigningKeyAlias=ventilatie
        -p:AndroidSigningKeyPass=ventilatie123
        -p:AndroidSigningStorePass=ventilatie123

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Android-APK
        path: MobileApp/bin/Release/net10.0-android/publish/*.apk
